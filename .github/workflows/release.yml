name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      version:
        description: "Tag (e.g. 0.1.0)"
        required: true
        type: string

jobs:
  config:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version}}
    steps:
      - name: Extract version
        id: extract
        run: |
          echo "version=${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}" >> "$GITHUB_OUTPUT"

  check:
    runs-on: ubuntu-latest
    needs: [config]
    steps:
      - name: Setup repo
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.config.outputs.version }}

      - name: Setup deno
        uses: denoland/setup-deno@v2
        with:
          deno-version-file: .tool-versions

      - name: Check fmt
        run: deno fmt --check

      - name: Type & Doc check
        run: deno check --doc

      - name: Run linter
        run: deno lint

      - name: Run tests
        run: deno test --parallel --fail-fast

  build:
    runs-on: ubuntu-latest
    needs: [config, check]
    steps:
      - name: Setup repo
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.config.outputs.version }}

      - name: Setup deno
        uses: denoland/setup-deno@v2
        with:
          deno-version-file: .tool-versions

      - name: Build npm package
        run: deno task build:npm ${{ needs.config.outputs.version }}

      - name: Cache package
        uses: actions/upload-artifact@v7
        with:
          name: npm-${{ needs.config.outputs.version }}
          path: npm/

  publish-npm:
    runs-on: ubuntu-latest
    needs: [config, check, build]
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Setup repo
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.config.outputs.version }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Download cached package
        uses: actions/download-artifact@v8
        with:
          name: npm-${{ needs.config.outputs.version }}
          path: npm

      - name: Publish
        working-directory: npm
        run: npm publish

  publish-jsr:
    runs-on: ubuntu-latest
    needs: [config, check, build]
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Setup repo
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.config.outputs.version }}

      - name: Setup deno
        uses: denoland/setup-deno@v2
        with:
          deno-version-file: .tool-versions

      - name: Publish
        run: deno publish

  create-github-release:
    runs-on: ubuntu-latest
    needs: [config, publish-npm, publish-jsr]
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Setup repo
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.config.outputs.version }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.config.outputs.version }}
        run: |
          gh release create "${TAG}" \
            --title "${TAG}" \
            --notes-file "docs/changes/${TAG}.md" \
            --verify-tag
